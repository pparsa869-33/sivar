<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="admin-body">
  <div class="admin-container">

    <!-- Header -->
    <div class="admin-header">
      <h1>پەڕەی بەڕێوەبردن</h1>
      <button id="logoutAdmin" class="admin-logout">Logout</button>
    </div>

    <!-- Announcements -->
    <div class="admin-card">
      <h2>ڕاگەیاندن</h2>
      <textarea id="announcementText" placeholder="نووسینی ڕاگەیاندن..."></textarea>
      <input type="file" id="announcementImage" accept="image/*" />
      <button onclick="postAnnouncement()">ناردن</button>
      <div id="announcementList"></div>
    </div>

    <!-- Upload media (disabled for now) -->
    <div class="admin-card">
      <h2>بارکردنی میدیا</h2>
      <p>ئەم بەشە دواتر زیاد دەکرێت</p>
    </div>

    <!-- Comments control -->
    <div class="admin-card">
      <h2>کۆمێنتەکان</h2>
      <div id="commentsList"></div>
    </div>

  </div>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

  <!-- Admin logic -->
  <script>
    // PROTECT ADMIN PAGE (localStorage login)
    const isLoggedIn = localStorage.getItem("isAdminLoggedIn");
    if (isLoggedIn !== "true") {
      window.location.replace("login.html");
    }

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCHdHnK0Lz8TITlrkWYgSdV8AmFZU3F7_0",
      authDomain: "sivarvocationalhighschoo-513aa.firebaseapp.com",
      projectId: "sivarvocationalhighschoo-513aa",
      storageBucket: "sivarvocationalhighschoo-513aa.appspot.com",
      messagingSenderId: "498314470915",
      appId: "1:498314470915:web:1d75488d20372f81e71036",
    };

    // Init Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Logout
    const btn = document.getElementById("logoutAdmin");
    if (btn) {
      btn.addEventListener("click", async () => {
        localStorage.removeItem("isAdminLoggedIn");
        await auth.signOut();
        window.location.replace("login.html");
      });
    }

    // Post announcement with optional image
    async function postAnnouncement() {
      const text = document.getElementById("announcementText").value.trim();
      const fileInput = document.getElementById("announcementImage");
      const file = fileInput.files[0];

      if (!text && !file) {
        alert("تکایە دەق یان وێنە زیاد بکە");
        return;
      }

      let imageUrl = "";

      // Upload image to ImgBB
      if (file) {
        const formData = new FormData();
        formData.append("image", file);

        const res = await fetch(
          "https://api.imgbb.com/1/upload?key=a60d17c9e2a12b41ef35cd6ef4f10115",
          {
            method: "POST",
            body: formData,
          }
        );

        const data = await res.json();
        imageUrl = data.data.url;
      }

      // Save to Firestore
      await db.collection("announcements").add({
        text: text,
        imageUrl: imageUrl,
        createdAt: new Date()
      });

      // Reset form
      document.getElementById("announcementText").value = "";
      fileInput.value = "";

      alert("ڕاگەیاندن زیادکرا");
    }

    // Load announcements in admin
    function loadAnnouncements() {
      db.collection("announcements")
        .orderBy("createdAt", "desc")
        .onSnapshot((snapshot) => {
          const list = document.getElementById("announcementList");
          if (!list) return;

          list.innerHTML = "";

          snapshot.forEach((doc) => {
            const data = doc.data();

            const item = document.createElement("div");
            item.className = "admin-announcement";

            item.innerHTML = `
              <span>${data.text || ""}</span>
              ${
                data.imageUrl
                  ? `<img src="${data.imageUrl}" style="max-width:120px;display:block;margin-top:6px;">`
                  : ""
              }
              <button onclick="deleteAnnouncement('${doc.id}')">حذف</button>
            `;

            list.appendChild(item);
          });
        });
    }

    // Delete announcement
    function deleteAnnouncement(id) {
      if (confirm("دڵنیای لە سڕینەوەی ئەم ڕاگەیاندنە؟")) {
        db.collection("announcements").doc(id).delete();
      }
    }

    // Start loading
    loadAnnouncements();
  </script>

</body>
</html>
